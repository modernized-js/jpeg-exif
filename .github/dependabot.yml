version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      eslint:
        patterns:
          - 'eslint'
          - '@eslint/*'
          - 'eslint-*'
          - 'typescript-eslint'
      typescript:
        patterns:
          - 'typescript'
          - '@types/*'
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
